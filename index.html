<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GR — Mineração Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --bg-deep:#0b0f08;
    --bg-panel-2:#1a2515;
    --moss:#3f5c2f;
    --moss-light:#6f9450;
    --moss-line:#2a3a20;
    --gold:#d4af37;
    --gold-light:#f2d97a;
    --gold-dim:#8a7127;
    --cream:#ece6d3;
    --muted:#8a9580;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    height:100%;
    overflow-x:hidden;
}

body{
    font-family:'Inter',sans-serif;
    background:
        radial-gradient(circle at 50% 15%, #1c2a13 0%, var(--bg-deep) 60%),
        var(--bg-deep);
    color:var(--cream);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    padding:40px 20px;
}

/* textura de fundo — linhas finas tipo veios de minério */
.veins{
    position:fixed;
    inset:0;
    z-index:0;
    opacity:.35;
    background-image:
        repeating-linear-gradient(115deg, rgba(212,175,55,.04) 0px, rgba(212,175,55,.04) 1px, transparent 1px, transparent 90px),
        repeating-linear-gradient(25deg, rgba(111,148,80,.05) 0px, rgba(111,148,80,.05) 1px, transparent 1px, transparent 70px);
    pointer-events:none;
}

.vignette{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:radial-gradient(circle at 50% 45%, transparent 35%, rgba(0,0,0,.55) 100%);
}

.sparks{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:2;
}

.spark{
    position:absolute;
    bottom:-10px;
    border-radius:50%;
    background:var(--gold-light);
    box-shadow:0 0 6px 2px rgba(212,175,55,.55);
    opacity:0;
    animation-name:rise;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
}

@keyframes rise{
    0%{ transform:translate(0,0); opacity:0; }
    8%{ opacity:.9; }
    85%{ opacity:.5; }
    100%{ transform:translate(var(--drift,0px), -112vh); opacity:0; }
}

.hero{
    position:relative;
    z-index:3;
    width:100%;
    max-width:460px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

/* ---------- moeda 3D girando ---------- */

.coin-wrap{
    perspective:700px;
    width:104px;
    height:104px;
    margin-bottom:26px;
    filter:drop-shadow(0 8px 24px rgba(212,175,55,.25));
    animation:floaty 3.6s ease-in-out infinite;
}

.coin{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    animation:spin 5s linear infinite;
}

.coin-face{
    position:absolute;
    inset:0;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Cormorant Garamond',serif;
    font-weight:700;
    font-size:30px;
    letter-spacing:.02em;
    color:#241c04;
    background:radial-gradient(circle at 35% 28%, var(--gold-light) 0%, var(--gold) 55%, var(--gold-dim) 100%);
    border:3px solid var(--gold-dim);
    box-shadow:
        0 0 34px rgba(212,175,55,.4),
        inset 0 0 14px rgba(0,0,0,.28),
        inset 0 2px 4px rgba(255,255,255,.35);
    backface-visibility:hidden;
}

.coin-face.back{ transform:rotateY(180deg); }

@keyframes spin{
    from{ transform:rotateY(0deg); }
    to{ transform:rotateY(360deg); }
}

@keyframes floaty{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-8px); }
}

/* ---------- textos ---------- */

.eyebrow{
    font-size:11px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--gold-dim);
    font-weight:500;
    margin-bottom:14px;
}

h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:48px;
    line-height:1.08;
    letter-spacing:.01em;
    color:var(--cream);
}

h1 .accent{
    background:linear-gradient(180deg, var(--gold-light), var(--gold) 65%, var(--gold-dim));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
}

.divider{
    width:70px;
    height:2px;
    margin:20px auto;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius:2px;
}

.subtitle{
    font-size:14px;
    line-height:1.65;
    color:var(--muted);
    max-width:340px;
    margin-bottom:32px;
}

/* ---------- selos de destaque ---------- */

.features{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:38px;
}

.feature{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    letter-spacing:.04em;
    color:var(--muted);
    background:rgba(255,255,255,.02);
    border:1px solid var(--moss-line);
    padding:8px 13px;
    border-radius:20px;
}

.feature .dot{
    width:5px;
    height:5px;
    border-radius:50%;
    background:var(--moss-light);
    box-shadow:0 0 6px 1px var(--moss-light);
}

/* ---------- botão CTA ---------- */

.btn-cta{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:linear-gradient(180deg, var(--gold-light), var(--gold));
    color:#1a1502;
    text-decoration:none;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:14px;
    letter-spacing:.12em;
    text-transform:uppercase;
    padding:16px 42px;
    border-radius:9px;
    box-shadow:
        0 10px 30px -8px rgba(212,175,55,.55),
        0 0 0 1px rgba(212,175,55,.25);
    transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
    overflow:hidden;
}

.btn-cta::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(100deg, transparent 20%, rgba(255,255,255,.55) 50%, transparent 80%);
    transform:translateX(-120%);
    animation:sweep 3.2s ease-in-out infinite;
}

@keyframes sweep{
    0%, 55%{ transform:translateX(-120%); }
    100%{ transform:translateX(120%); }
}

.btn-cta:hover{
    transform:translateY(-2px);
    filter:brightness(1.08);
    box-shadow:
        0 14px 36px -6px rgba(212,175,55,.65),
        0 0 0 1px rgba(212,175,55,.35);
}

.btn-cta:active{ transform:translateY(0) scale(.98); }

.btn-cta svg{ width:15px; height:15px; }

/* ---------- rodapé ---------- */

.hero-footer{
    margin-top:44px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.15em;
    color:#3f4a37;
    text-transform:uppercase;
}

</style>
</head>

<body>

<div class="veins"></div>
<div class="sparks" id="sparks"></div>
<div class="vignette"></div>

<div class="hero">

<div class="coin-wrap">
<div class="coin">
<div class="coin-face front">GR</div>
<div class="coin-face back">GR</div>
</div>
</div>

<div class="eyebrow">Plataforma de Mineração</div>

<h1>Mineração<br><span class="accent">GR</span></h1>

<div class="divider"></div>

<p class="subtitle">
Simule investimentos, acompanhe o retorno em tempo real e colete
seus tokens em ciclos automatizados de 30 dias — tudo em um único painel.
</p>

<div class="features">
<div class="feature"><span class="dot"></span>24h Ativo</div>
<div class="feature"><span class="dot"></span>Ciclos de 30 Dias</div>
<div class="feature"><span class="dot"></span>Painel em Tempo Real</div>
</div>

<a href="mineracao.html" class="btn-cta">
Iniciar
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
<path d="M5 12h14"/>
<path d="M13 6l6 6-6 6"/>
</svg>
</a>

<div class="hero-footer">GR © 2026</div>

</div>

<script>

// gera as partículas douradas flutuantes de fundo
const container = document.getElementById("sparks");
const total = 26;

for(let i = 0; i < total; i++){

    const s = document.createElement("div");
    s.className = "spark";

    const size = (Math.random() * 2.5 + 1.5).toFixed(1);
    const left = (Math.random() * 100).toFixed(2);
    const duration = (Math.random() * 10 + 9).toFixed(2);
    const delay = (Math.random() * -20).toFixed(2);
    const drift = (Math.random() * 80 - 40).toFixed(0);

    s.style.width = size + "px";
    s.style.height = size + "px";
    s.style.left = left + "%";
    s.style.animationDuration = duration + "s";
    s.style.animationDelay = delay + "s";
    s.style.setProperty("--drift", drift + "px");

    container.appendChild(s);
}

</script>

</body>
</html>
